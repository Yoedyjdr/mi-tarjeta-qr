<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido, Mio!</title>
    <style>
        /* CSS: El diseño para que se vea duro */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212; /* Fondo oscuro elegante */
            color: #ffffff; /* Letras blancas */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .tarjeta {
            background-color: #1e1e1e; /* Color de la tarjeta */
            padding: 40px;
            border-radius: 20px; /* Bordes redondeados */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); /* Sombra nítida */
            text-align: center;
            border: 2px solid #3498db; /* Borde azul clave */
            width: 80%;
            max-width: 350px;
        }

        h1 {
            color: #3498db; /* Título azul */
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .emoji {
            font-size: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="tarjeta">
        <div class="emoji">👋😎🔥</div>
        <h1>¡Dímelo, Mio!</h1>
        <p>¡Bienvenido a mi primera maquinación digital! Si escaneaste esto, ya sabes que estamos en la cosa.</p>
        <p><strong>- El Arquitecto -</strong></p>
    </div>
</body>
</html>
